server:
  host: "localhost" # IP hidden do to privacy 
  port: 8000
  api_base: "http://localhost:8000/v1" # IP hidden do to privacy 

model:
  name: "Qwen/Qwen2-7B-Instruct"
  max_tokens: 128              # fixed output length across all experiments
  temperature: 0.0             
  top_p: 1.0

benchmark:
  warmup_requests: 10          # requests sent before measurement begins (discarded)
  test_duration_sec: 60        # measurement window per configuration
  request_timeout_sec: 120     # per-request hard timeout
  iterations: 3                # independent runs per (prompt_len, concurrency) cell

output:
  results_dir: "results"
  save_raw: true               # save per-request JSON records